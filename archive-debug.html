<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>자문자료실 업무분류 진단</title>
<style>
body{font-family:sans-serif;background:#f1f5f9;margin:0;padding:20px}
h2{color:#1e293b;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.badge{display:inline-block;min-width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;font-weight:700;flex-shrink:0}
.badge.wait{background:#e2e8f0;color:#94a3b8}
.badge.ok{background:#dcfce7;color:#16a34a}
.badge.err{background:#fee2e2;color:#dc2626}
.badge.run{background:#dbeafe;color:#2563eb}
.step-txt{flex:1;line-height:1.5}
.detail{color:#64748b;font-size:12px;margin-top:2px;word-break:break-all}
.red{color:#dc2626;font-weight:600}
.green{color:#16a34a;font-weight:600}
.btn{padding:12px 28px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:20px}
.btn:disabled{background:#94a3b8}
.result-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin-top:8px}
.final{padding:16px;border-radius:10px;font-size:14px;font-weight:600;margin-top:8px}
.final.ok{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.final.err{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.final.wait{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
</style>
</head>
<body>
<h2>🔍 자문자료실 업무분류 드롭다운 진단</h2>
<p class="sub">DB 연결부터 소분류 매핑까지 단계별로 확인합니다.</p>
<button class="btn" id="btnRun" onclick="runDiag()">▶ 진단 시작</button>
<div class="card">
<h3>📋 진단 단계</h3>
<div class="step"><span class="badge wait" id="b1">1</span><div class="step-txt"><strong>Supabase API 연결 확인</strong><div class="detail" id="d1">대기 중...</div></div></div>
<div class="step"><span class="badge wait" id="b2">2</span><div class="step-txt"><strong>work_categories 테이블 조회</strong><div class="detail" id="d2">대기 중...</div></div></div>
<div class="step"><span class="badge wait" id="b3">3</span><div class="step-txt"><strong>'일반자문업무' 대분류 찾기</strong><div class="detail" id="d3">대기 중...</div></div></div>
<div class="step"><span class="badge wait" id="b4">4</span><div class="step-txt"><strong>work_subcategories 테이블 조회</strong><div class="detail" id="d4">대기 중...</div></div></div>
<div class="step"><span class="badge wait" id="b5">5</span><div class="step-txt"><strong>일반자문업무 소분류 필터링</strong><div class="detail" id="d5">대기 중...</div></div></div>
<div class="step"><span class="badge wait" id="b6">6</span><div class="step-txt"><strong>드롭다운 옵션 최종 결과</strong><div class="detail" id="d6">대기 중...</div></div></div>
</div>
<div class="card" id="catCard" style="display:none"><h3>📂 전체 대분류 목록</h3><div class="result-box" id="catList"></div></div>
<div class="card" id="subCard" style="display:none"><h3>📂 전체 소분류 목록</h3><div class="result-box" id="subList"></div></div>
<div id="finalBox" class="final wait">진단을 시작하려면 위 버튼을 클릭하세요.</div>
<script>
// 운영/스테이징은 빌드 주입(supabase-env.js)을 사용하고, 로컬은 supabase.dev.js를 사용합니다.
const SB_URL = window.__SMARTLOG_SB_URL__ || '';
const SB_KEY = window.__SMARTLOG_SB_KEY__ || '';
const H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'count=exact'};
function sb(n,s,m,d=''){
  const b=document.getElementById('b'+n),el=document.getElementById('d'+n);
  b.className='badge '+s;
  b.textContent=s==='ok'?'✓':s==='err'?'✗':s==='run'?'…':n;
  el.innerHTML=m+(d?'<br><span class="'+(s==='err'?'red':'green')+'">'+d+'</span>':'');
}
async function get(t,lim=200){
  const r=await fetch(SB_URL+'/rest/v1/'+t+'?select=*&limit='+lim+'&offset=0',{headers:H});
  const tot=r.headers.get('Content-Range')?.split('/')[1]||'?';
  if(!r.ok)throw new Error('HTTP '+r.status+' - '+(await r.text()));
  return{data:await r.json(),total:tot};
}
async function runDiag(){
  document.getElementById('btnRun').disabled=true;
  const fb=document.getElementById('finalBox');
  fb.className='final wait';fb.textContent='진단 중...';
  sb(1,'run','Supabase 연결 테스트 중...');
  try{
    const r=await fetch(SB_URL+'/rest/v1/work_categories?select=id&limit=1',{headers:H});
    if(!r.ok)throw new Error('HTTP '+r.status);
    sb(1,'ok','API 연결 성공','HTTP '+r.status);
  }catch(e){sb(1,'err','API 연결 실패',e.message);fb.className='final err';fb.textContent='❌ '+e.message;document.getElementById('btnRun').disabled=false;return;}
  sb(2,'run','work_categories 조회 중...');
  let cats=[];
  try{
    const r=await get('work_categories');cats=r.data||[];
    sb(2,'ok','대분류 '+cats.length+'개 조회 성공','총 '+r.total+'건');
    document.getElementById('catCard').style.display='';
    document.getElementById('catList').textContent=cats.map((c,i)=>'['+(i+1)+'] category_name: "'+c.category_name+'"\n    id: '+c.id+'\n    deleted: '+c.deleted).join('\n\n');
  }catch(e){sb(2,'err','조회 실패',e.message);fb.className='final err';fb.textContent='❌ '+e.message;document.getElementById('btnRun').disabled=false;return;}
  sb(3,'run',"'일반자문업무' 검색 중...");
  const target=cats.find(c=>c.category_name==='일반자문업무');
  if(!target){
    const names=cats.map(c=>'"'+c.category_name+'"').join(', ');
    sb(3,'err','찾을 수 없음','실제 대분류명: '+names);
    fb.className='final err';fb.innerHTML='❌ DB에 <b>일반자문업무</b> 없음<br>실제 대분류: '+names;
    document.getElementById('btnRun').disabled=false;return;
  }
  sb(3,'ok','찾기 성공','id: '+target.id);
  sb(4,'run','work_subcategories 조회 중...');
  let subs=[];
  try{
    const r=await get('work_subcategories',500);subs=r.data||[];
    sb(4,'ok','소분류 '+subs.length+'개 조회 성공','총 '+r.total+'건');
    document.getElementById('subCard').style.display='';
    document.getElementById('subList').textContent=subs.map((s,i)=>'['+(i+1)+'] sub_category_name: "'+s.sub_category_name+'"\n    category_id: "'+s.category_id+'"').join('\n\n');
  }catch(e){sb(4,'err','조회 실패',e.message);fb.className='final err';fb.textContent='❌ '+e.message;document.getElementById('btnRun').disabled=false;return;}
  sb(5,'run','category_id='+target.id+' 필터링 중...');
  const filtered=subs.filter(s=>s.category_id===target.id).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  if(!filtered.length){
    const ids=[...new Set(subs.map(s=>s.category_id))].slice(0,3);
    sb(5,'err','매칭 소분류 없음','target.id='+target.id+' / DB ids: '+ids.join(', '));
    fb.className='final err';fb.innerHTML='❌ <b>category_id 불일치</b><br>일반자문업무 id: '+target.id+'<br>소분류의 category_id를 확인하세요.';
    document.getElementById('btnRun').disabled=false;return;
  }
  sb(5,'ok',filtered.length+'개 매칭 성공',filtered.map(s=>'"'+s.sub_category_name+'"').join(', '));
  sb(6,'ok','드롭다운 생성 가능',filtered.length+'개: '+filtered.map(s=>s.sub_category_name).join(' / '));
  fb.className='final ok';
  fb.innerHTML='✅ DB 연동 정상! 소분류 '+filtered.length+'개:<br><br>'+filtered.map((s,i)=>(i+1)+'. '+s.sub_category_name).join('<br>');
  document.getElementById('btnRun').disabled=false;
}
</script>
</body>
</html>
